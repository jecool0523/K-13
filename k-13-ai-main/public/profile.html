<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>New Character AI - 계정 관리</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="profile-container">
    <h2>New Character AI<br><small>내 계정 관리</small></h2>
    <div id="user-email"></div>
    <form id="api-key-form">
      <label for="apiKey">AI API 키 변경</label><br>
      <input type="text" id="apiKey" placeholder="새 API 키 입력"><br>
      <button type="submit">API 키 저장</button>
    </form>
    <form id="password-form">
      <label for="currentPassword">현재 비밀번호</label><br>
      <input type="password" id="currentPassword" placeholder="현재 비밀번호" required><br>
      <label for="newPassword">새 비밀번호</label><br>
      <input type="password" id="newPassword" placeholder="새 비밀번호" required><br>
      <button type="submit">비밀번호 변경</button>
    </form>
    <button id="logout-btn">로그아웃</button>
  </div>
  <script src="/js/profile.js"></script>
</body>
</html>
