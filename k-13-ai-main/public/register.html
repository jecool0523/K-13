<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>New Character AI - 회원가입</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="register-container">
    <form id="register-form">
      <h2>New Character AI<br><small>회원가입</small></h2>
      <input type="text" id="id" placeholder="아이디" required><br>
      <input type="password" id="password" placeholder="비밀번호" required><br>
      <input type="text" id="nickname" placeholder="닉네임" required><br>
      <input type="text" id="apiKey" placeholder="AI API 키 (선택)"><br>
      <button type="submit">회원가입</button>
    </form>
  </div>
  <script src="/js/register.js"></script>
</body>
</html>
